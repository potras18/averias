# averias/app/pubspec.yaml
name: averias_app
description: Arcade machine maintenance tracker
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fl_chart: ^0.69.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  go_router: ^13.2.4
  local_auth: ^2.3.0
  mobile_scanner: ^5.2.1
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/cocamatic-logo.png

  fonts:
    - family: Carlito
      fonts:
        - asset: fonts/Carlito-Regular.ttf
        - asset: fonts/Carlito-Italic.ttf
          style: italic
        - asset: fonts/Carlito-Bold.ttf
          weight: 700
        - asset: fonts/Carlito-BoldItalic.ttf
          weight: 700
          style: italic
